<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units</title>
    <link rel="stylesheet" href="css/units.css">
</head>
<body>

    <div class="box-px">
        Fixed: 300px wide
    </div>

    <div class="box-percent">
        Flexible: 50% wide
    </div>

    <div class="box-rem">
        Font-based: 20rem wide
    </div>

    <div class="box-vw">
        Viewport: 60vw wide
    </div>

</body>
</html>
