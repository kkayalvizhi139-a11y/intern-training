<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Hierarchy</title>
</head>
<body>

    <h1>My Portfolio</h1>

    <h2>About Me</h2>

    <p>
        I am a Computer Science and Engineering student passionate about web development.
    </p>

    <h2>Skills</h2>

    <h3>Programming Languages</h3>

    <ul>
        <li>JavaScript</li>
        <li>TypeScript</li>
        <li>HTML</li>
        <li>CSS</li>
    </ul>

    <h2>Contact</h2>

    <p>Email: example@email.com</p>

    <!--
    The heading level that should directly follow an <h1> is <h2>.
    Headings should follow a logical hierarchy (h1 → h2 → h3 → h4...)
    without skipping levels, because it improves accessibility,
    readability, and SEO.
    -->

</body>
</html>
