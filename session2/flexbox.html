<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="css/flexbox.css">
</head>
<body>

    <h1>Flexbox Demonstration</h1>

    <!-- Task 2.1 -->
    <h2>Flex Container Basics</h2>

    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>

    <!-- Task 2.2 -->
    <h2>Flex Grow Demo</h2>

    <div class="grow-container">
        <div class="grow-1">grow: 1</div>
        <div class="grow-2">grow: 2</div>
        <div class="grow-1">grow: 1</div>
    </div>

    <!-- Task 2.3 -->
    <h2>Navigation Bar</h2>

    <nav class="navbar">
        <div class="logo">MyApp</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Task 2.4 -->
    <h2>Card Row</h2>

    <section class="card-row">

        <div class="card">
            <h3>Card One</h3>
            <p>Some description text goes here.</p>
        </div>

        <div class="card">
            <h3>Card Two</h3>
            <p>Some description text goes here.</p>
        </div>

        <div class="card">
            <h3>Card Three</h3>
            <p>Some description text goes here.</p>
        </div>

    </section>

</body>
</html>
