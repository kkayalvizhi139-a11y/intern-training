<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <link rel="stylesheet" href="css/grid.css">
</head>
<body>

    <h1>CSS Grid Demonstration</h1>

    
    <h2>Grid Basics</h2>

    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>


    <h2>Column Spanning</h2>

    <div class="grid-container-featured">
        <div class="featured">Featured</div>
        <div class="grid-item">A</div>
        <div class="grid-item">B</div>
        <div class="grid-item">C</div>
        <div class="grid-item">D</div>
    </div>

   

    <h2>Page Layout</h2>

    <div class="page-layout">

        <header class="page-header">
            Header
        </header>

        <aside class="page-sidebar">
            Sidebar
        </aside>

        <main class="page-main">
            Main Content
        </main>

        <footer class="page-footer">
            Footer
        </footer>

    </div>

    
    <h2>Responsive Photo Grid</h2>

    <div class="photo-grid">

        <div class="photo-card">Photo 1</div>
        <div class="photo-card">Photo 2</div>
        <div class="photo-card">Photo 3</div>
        <div class="photo-card">Photo 4</div>
        <div class="photo-card">Photo 5</div>
        <div class="photo-card">Photo 6</div>

    </div>

</body>
</html>
